apiVersion: apps/v1
kind: Deployment
metadata:
  name: shrine-deployment
  namespace: shrine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shrine
  template:
    metadata:
      labels:
        app: shrine
    spec:
      containers:
      - name: shrine-app
        image: gcr.io/YOUR_PROJECT_ID/shrine:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: shrine-config
              key: db_host
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shrine-service
  namespace: shrine
spec:
  selector:
    app: shrine
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shrine-hpa
  namespace: shrine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shrine-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70