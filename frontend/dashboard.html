<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrine | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0c29; color: white; }
        .navbar { background: rgba(15,12,41,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 32px; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-badge { background: rgba(233,69,96,0.2); padding: 8px 16px; border-radius: 20px; font-size: 0.875rem; }
        .logout-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 20px; border-radius: 20px; color: white; cursor: pointer; }
        .logout-btn:hover { background: #e94560; }
        .main-container { max-width: 1400px; margin: 0 auto; padding: 32px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px; }
        .tab-btn { background: none; border: none; padding: 10px 24px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: rgba(233,69,96,0.15); color: #e94560; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.08); }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .input-group input { flex: 1; padding: 14px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 0.875rem; }
        .input-group input:focus { outline: none; border-color: #e94560; }
        .btn { padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 0.875rem; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c62a4a); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(233,69,96,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 2rem; font-weight: 800; color: #e94560; }
        .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 8px; }
        .progress-container { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #00c853, #ffd600, #e94560); height: 100%; width: 0%; transition: width 0.5s ease; }
        .comments-list { max-height: 500px; overflow-y: auto; }
        .comment-card { background: rgba(255,255,255,0.03); padding: 16px; margin-bottom: 12px; border-radius: 12px; border-left: 3px solid #e94560; }
        .comment-card.safe { border-left-color: #00c853; }
        .comment-card.moderate { border-left-color: #ffd600; }
        .comment-card.toxic { border-left-color: #e94560; background: rgba(233,69,96,0.05); }
        .comment-author { font-weight: 600; color: #e94560; margin-bottom: 8px; }
        .comment-text { font-size: 0.875rem; line-height: 1.5; margin-bottom: 8px; }
        .comment-meta { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .toxicity-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; margin-left: 10px; }
        .badge-toxic { background: #e94560; }
        .badge-moderate { background: #ffd600; color: #1a1a2e; }
        .badge-safe { background: #00c853; }
        .live-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin: 20px 0; }
        .live-stat-card { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; text-align: center; }
        .live-stat-value { font-size: 1.5rem; font-weight: 700; }
        .live-stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 5px; }
        .live-alert { padding: 16px; border-radius: 12px; margin: 16px 0; display: none; }
        .live-alert.critical { display: block; background: #e94560; }
        .live-alert.warning { display: block; background: #ffd600; color: #1a1a2e; }
        .live-alert.advisory { display: block; background: #ff9800; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .chart-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .chart-card h4 { margin-bottom: 16px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.7); }
        canvas { max-height: 200px; width: 100%; }
        .history-list { display: flex; flex-direction: column; gap: 16px; }
        .history-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .history-title { font-weight: 600; color: #e94560; }
        .history-date { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .history-stats { display: flex; gap: 20px; margin-bottom: 16px; font-size: 0.8rem; }
        .history-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; }
        .history-btn:hover { background: rgba(233,69,96,0.3); }
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
        .error { color: #ff6b6b; padding: 16px; border-left: 3px solid #ff6b6b; background: rgba(255,107,107,0.1); border-radius: 8px; }
        .success { color: #00c853; padding: 16px; border-left: 3px solid #00c853; background: rgba(0,200,83,0.1); border-radius: 8px; }
        .report-section, .attack-section, .recommendations-section { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; }
        .report-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .report-content { max-height: 400px; overflow-y: auto; font-size: 0.8rem; }
        .video-info { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .results { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .live-status { margin: 16px 0; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a2e; border-radius: 16px; max-width: 600px; width: 90%; max-height: 80%; overflow-y: auto; padding: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .close-modal:hover { color: #e94560; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(233,69,96,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e94560; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><div class="logo"><h1>Shrine</h1><p>Comment Stream Sentinel</p></div><div class="user-info"><span class="user-badge" id="userDisplay"></span><button class="logout-btn" onclick="logout()">Sign Out</button></div></div></nav>
    <div class="main-container">
        <div class="tabs"><button class="tab-btn active" onclick="switchTab('posted')">Posted Videos</button><button class="tab-btn" onclick="switchTab('live')">Live Streams</button><button class="tab-btn" onclick="switchTab('history')">History</button></div>
        <div id="postedTab" class="tab-content active">
            <div class="card">
                <div class="input-group"><input type="text" id="videoUrl" placeholder="Enter YouTube Video URL"><button class="btn btn-primary" onclick="analyzeVideo()">Analyze</button><button class="btn btn-secondary" id="fetchBtn" onclick="fetchVideoComments()" disabled>Fetch Comments</button><button class="btn btn-secondary" id="sentimentBtn" onclick="analyzeSentiment()" disabled>Analyze Sentiment</button></div>
                <div id="videoInfo" class="video-info"></div>
                <div id="statsSection" style="display:none;"><div class="stats-grid" id="statsGrid"></div><div class="progress-container"><div class="progress-bar" id="toxicityProgress"></div></div></div>
                <div id="results" class="results"></div>
                <div id="commentsList" class="comments-list"></div>
            </div>
        </div>
        <div id="liveTab" class="tab-content">
            <div class="card">
                <div class="input-group"><input type="text" id="liveVideoUrl" placeholder="Enter YouTube Live Stream URL"><button class="btn btn-primary" onclick="startLiveMonitoring()">Start Monitoring</button><button class="btn btn-secondary" id="stopLiveBtn" onclick="stopLiveMonitoring()" disabled>Stop</button></div>
                <div class="charts-grid"><div class="chart-card"><h4>Toxicity Trend</h4><canvas id="toxicityChart"></canvas></div><div class="chart-card"><h4>Attack Score Trend</h4><canvas id="attackChart"></canvas></div><div class="chart-card"><h4>Velocity and Acceleration</h4><canvas id="velocityChart"></canvas></div><div class="chart-card"><h4>Current Toxicity</h4><canvas id="gaugeChart"></canvas></div></div>
                <div id="liveStatus" class="live-status"></div>
                <div id="liveAlert" class="live-alert"></div>
                <div id="liveStats" class="live-stats"></div>
                <div id="recentAlerts" class="recent-alerts"></div>
                <div id="attackSection" class="attack-section" style="display:none;"></div>
                <div id="recommendationsSection" class="recommendations-section" style="display:none;"></div>
                <div id="reportSection" class="report-section" style="display:none;">
                    <h4>Post-Mortem Report</h4>
                    <div class="report-controls"><button class="btn btn-primary" id="generateReportBtn">Generate Report</button><button class="btn btn-secondary" id="exportJSONBtn" disabled>Export JSON</button><button class="btn btn-secondary" id="exportCSVBtn" disabled>Export CSV</button><button class="btn btn-secondary" id="saveHistoryBtn" disabled>Save to History</button></div>
                    <div id="reportContent" class="report-content"></div>
                </div>
            </div>
        </div>
        <div id="historyTab" class="tab-content"><div class="card"><div class="card-title">Monitoring History</div><div id="historyList" class="history-list"></div></div></div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
