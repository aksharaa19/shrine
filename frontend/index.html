<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrine | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 450px; padding: 20px; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 24px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { color: rgba(255,255,255,0.6); font-size: 0.875rem; margin-top: 8px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .tab-btn { flex: 1; background: none; border: none; padding: 10px; font-size: 1rem; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 8px; }
        .tab-btn.active { color: #e94560; background: rgba(233,69,96,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #e94560; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #e94560, #c62a4a); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .error-message { background: rgba(233,69,96,0.2); border-left: 3px solid #e94560; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 0.875rem; color: #ff6b6b; }
        .success-message { background: rgba(0,200,83,0.2); border-left: 3px solid #00c853; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 0.875rem; color: #00c853; }
        .demo-credentials { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .demo-credentials p { color: rgba(255,255,255,0.4); font-size: 0.75rem; }
        .demo-credentials code { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: #ffd600; }
        .form-container { display: none; }
        .form-container.active { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><h1>Shrine</h1><p>Comment Stream Sentinel</p></div>
            <div class="tabs"><button class="tab-btn active" onclick="switchTab('login')">Sign In</button><button class="tab-btn" onclick="switchTab('register')">Create Account</button></div>
            <div id="loginForm" class="form-container active">
                <div class="form-group"><input type="text" id="loginUsername" placeholder="Username"></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                <button class="btn-primary" onclick="handleLogin()">Sign In</button>
                <div id="loginError"></div>
            </div>
            <div id="registerForm" class="form-container">
                <div class="form-group"><input type="text" id="regUsername" placeholder="Username"></div>
                <div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="form-group"><input type="password" id="regPassword" placeholder="Password"></div>
                <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirm Password"></div>
                <button class="btn-primary" onclick="handleRegister()">Create Account</button>
                <div id="regError"></div>
            </div>
            <div class="demo-credentials"><p>Demo Account</p><p><code>demo</code> / <code>demo123</code></p></div>
        </div>
    </div>
    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:8080' : '';
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'login') { loginForm.classList.add('active'); registerForm.classList.remove('active'); tabs[0].classList.add('active'); }
            else { loginForm.classList.remove('active'); registerForm.classList.add('active'); tabs[1].classList.add('active'); }
        }
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            if (!username || !password) { errorDiv.innerHTML = '<div class="error-message">Please enter username and password</div>'; return; }
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
                const data = await response.json();
                if (response.ok && data.success) { localStorage.setItem('shrine_token', data.token); localStorage.setItem('shrine_username', data.username); window.location.href = 'dashboard.html'; }
                else { errorDiv.innerHTML = `<div class="error-message">${data.error || 'Login failed'}</div>`; }
            } catch(error) { errorDiv.innerHTML = '<div class="error-message">Connection error. Make sure backend is running.</div>'; }
        }
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorDiv = document.getElementById('regError');
            if (!username || !email || !password) { errorDiv.innerHTML = '<div class="error-message">Please fill all fields</div>'; return; }
            if (password !== confirm) { errorDiv.innerHTML = '<div class="error-message">Passwords do not match</div>'; return; }
            if (password.length < 4) { errorDiv.innerHTML = '<div class="error-message">Password must be at least 4 characters</div>'; return; }
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password, email}) });
                const data = await response.json();
                if (response.ok && data.success) { errorDiv.innerHTML = '<div class="success-message">Registration successful! Please sign in.</div>'; setTimeout(() => switchTab('login'), 1500); }
                else { errorDiv.innerHTML = `<div class="error-message">${data.error || 'Registration failed'}</div>`; }
            } catch(error) { errorDiv.innerHTML = '<div class="error-message">Connection error. Make sure backend is running.</div>'; }
        }
    </script>
</body>
</html>s
