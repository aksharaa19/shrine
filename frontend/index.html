<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrine | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-radius: 8px;
        }
        .tab-btn.active {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c62a4a);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .error-message {
            background: rgba(233, 69, 96, 0.2);
            border-left: 3px solid #e94560;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.875rem;
            color: #ff6b6b;
        }
        .success-message {
            background: rgba(0, 200, 83, 0.2);
            border-left: 3px solid #00c853;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.875rem;
            color: #00c853;
        }
        .demo-credentials {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .demo-credentials p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }
        .demo-credentials code {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #ffd600;
        }
        .form-container {
            display: none;
        }
        .form-container.active {
            display: block;
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .divider span {
            background: rgba(15, 12, 41, 0.8);
            padding: 0 10px;
            position: relative;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>Shrine</h1>
                <p>Comment Stream Sentinel</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
            </div>
            <div id="loginForm" class="form-container active">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button class="btn-primary" onclick="handleLogin()">Sign In</button>
                <div class="divider"><span>OR</span></div>
                <button class="google-btn" onclick="handleGoogleLogin()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
                <div id="loginError"></div>
            </div>
            <div id="registerForm" class="form-container">
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="Username">
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Password">
                </div>
                <div class="form-group">
                    <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
                </div>
                <button class="btn-primary" onclick="handleRegister()">Create Account</button>
                <div id="regError"></div>
            </div>
            <div class="demo-credentials">
                <p>Demo Account</p>
                <p><code>demo</code> / <code>demo123</code></p>
            </div>
        </div>
    </div>
    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:8080' : '';
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[1].classList.add('active');
            }
        }
        
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            if (!username || !password) {
                errorDiv.innerHTML = '<div class="error-message">Please enter username and password</div>';
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    localStorage.setItem('shrine_token', data.token);
                    localStorage.setItem('shrine_username', data.username);
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.innerHTML = `<div class="error-message">${data.error || 'Login failed'}</div>`;
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error-message">Connection error. Make sure backend is running.</div>';
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorDiv = document.getElementById('regError');
            if (!username || !email || !password) {
                errorDiv.innerHTML = '<div class="error-message">Please fill all fields</div>';
                return;
            }
            if (password !== confirm) {
                errorDiv.innerHTML = '<div class="error-message">Passwords do not match</div>';
                return;
            }
            if (password.length < 4) {
                errorDiv.innerHTML = '<div class="error-message">Password must be at least 4 characters</div>';
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, email})
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    errorDiv.innerHTML = '<div class="success-message">Registration successful! Please sign in.</div>';
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    errorDiv.innerHTML = `<div class="error-message">${data.error || 'Registration failed'}</div>`;
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error-message">Connection error. Make sure backend is running.</div>';
            }
        }
        
        async function handleGoogleLogin() {
            try {
                const response = await fetch(`${API_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_token: 'test_token'})
                });
                const data = await response.json();
                if (response.ok && data.token) {
                    localStorage.setItem('shrine_token', data.token);
                    localStorage.setItem('shrine_username', data.user.username);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('loginError').innerHTML = '<div class="error-message">Google sign in not configured yet. Use demo account.</div>';
                }
            } catch (error) {
                document.getElementById('loginError').innerHTML = '<div class="error-message">Google sign in not configured yet. Use demo account.</div>';
            }
        }
    </script>
</body>
</html>
